name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend and repository policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Validate versions and repository policy
        run: node scripts/check-version.mjs
      - name: Validate catalog and preset policy
        run: node scripts/validate-catalog.mjs
      - name: Run frontend tests
        run: npm test -- --run
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Tauri Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Run clippy with warnings denied
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  windows-tauri:
    name: Windows x64 Tauri build
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install locked dependencies
        run: npm ci
      - name: Build unsigned CI-only NSIS bundle
        shell: pwsh
        run: npm run tauri build -- --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Upload CI installer
        uses: actions/upload-artifact@v4
        with:
          name: wuwa-ini-tool-windows-ci
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
